<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Impostor - Das Spiel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 2rem;
        }
        
        .screen {
            display: none;
            width: 100%;
        }
        
        .screen.active {
            display: block;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: manipulation;
        }
        
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        input[type="text"], input[type="number"] {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 15px;
            width: 100%;
            text-align: center;
            margin: 10px 0;
        }
        
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #e94560;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .player-count-display {
            font-size: 4rem;
            font-weight: bold;
            margin: 20px 0;
            color: #e94560;
        }
        
        .word-display {
            font-size: 1.8rem;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            margin: 20px 0;
            word-break: break-word;
        }
        
        .hidden-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 3rem;
            border-radius: 15px;
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .hidden-card:hover {
            transform: scale(1.02);
        }
        
        .hidden-card:active {
            transform: scale(0.98);
        }
        
        .impostor-word {
            color: #ff6b6b;
        }
        
        .category-only {
            font-size: 1.2rem;
            color: #888;
        }
        
        .progress {
            color: #888;
            margin-bottom: 1rem;
        }
        
        .name-input {
            padding: 12px;
            font-size: 1rem;
            margin: 5px 0;
            text-align: left;
        }
        
        .voting-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .vote-btn {
            padding: 20px;
            font-size: 1rem;
        }
        
        .result-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 2rem;
            border-radius: 15px;
            margin: 20px 0;
        }
        
        .winner-text {
            font-size: 2rem;
            color: #4caf50;
            margin-bottom: 1rem;
        }
        
        .loser-text {
            color: #ff6b6b;
        }
        
        .vote-count {
            font-size: 1.2rem;
            color: #aaa;
            margin: 10px 0;
        }
        
        .player-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .player-card:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .player-card.selected {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.2);
        }
        
        .player-number {
            background: #e94560;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .name-list {
            text-align: left;
            margin: 20px 0;
        }
        
        .name-list-item {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            align-items: center;
        }
        
        @media (max-height: 600px) {
            h1 { font-size: 2rem; }
            .card { padding: 1.5rem; }
            .btn { padding: 12px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎭 Impostor</h1>
        <p class="subtitle">Finde den Imposter!</p>
        
        <!-- Screen: Player Count -->
        <div id="screen-players" class="screen active">
            <div class="card">
                <h2>Spieleranzahl</h2>
                <p style="margin: 20px 0; color: #aaa;">Wie viele Spieler?</p>
                
                <div class="player-count-display" id="playerCountDisplay">4</div>
                
                <input type="range" id="playerCountSlider" min="3" max="20" value="4" style="width: 100%; margin: 20px 0;">
                
                <button class="btn" onclick="goToNames()">Weiter</button>
            </div>
        </div>
        
        <!-- Screen: Player Names -->
        <div id="screen-names" class="screen">
            <div class="card">
                <h2>Spielernamen</h2>
                <p style="margin: 10px 0; color: #aaa;" id="namePrompt">Spieler 1</p>
                
                <input type="text" id="playerNameInput" placeholder="Name eingeben..." maxlength="20" autocomplete="off">
                
                <button class="btn" onclick="addPlayerName()">Bestätigen</button>
                
                <div id="nameList" class="name-list"></div>
            </div>
        </div>
        
        <!-- Screen: Pass Around - Hidden Card -->
        <div id="screen-pass-hidden" class="screen">
            <div class="card">
                <p class="progress" id="passHiddenPrompt">Spieler 1 ist an der Reihe</p>
                
                <div class="hidden-card" id="hiddenCard" onclick="revealCard()">
                    <p style="font-size: 1.5rem;">🎴</p>
                    <p style="margin-top: 10px;">Karte umdrehen</p>
                </div>
                
                <button class="btn" id="nextPlayerBtn" onclick="nextPlayer()" style="display: none;">Weiter</button>
            </div>
        </div>
        
        <!-- Screen: Select Imposter -->
        <div id="screen-select" class="screen">
            <div class="card">
                <h2>Wer ist der Imposter?</h2>
                <p style="color: #aaa; margin-bottom: 20px;">Tippe auf den Spieler, der der Imposter ist:</p>
                
                <div id="playerSelection">
                </div>
            </div>
        </div>
        
        <!-- Screen: Results -->
        <div id="screen-results" class="screen">
            <div class="card">
                <h2>📊 Ergebnis</h2>
                
                <div class="result-box" id="resultBox">
                </div>
                
                <button class="btn" onclick="newRound()">Neue Runde</button>
                <button class="btn btn-secondary" onclick="resetGame()">Neues Spiel</button>
            </div>
        </div>
    </div>

    <script>
        // Game State
        let state = {
            playerCount: 4,
            playerNames: [],
            currentNameIndex: 0,
            currentPlayerIndex: 0,
            isCardRevealed: false,
            currentWord: '',
            currentCategory: '',
            impostorIndex: -1,
            words: [],
            selectedImpostor: -1
        };
        
        let kategorien = [];
        
        // Load data
        async function loadData() {
            try {
                const response = await fetch('data/kategorien.json');
                const data = await response.json();
                kategorien = data.kategorien;
            } catch (e) {
                kategorien = [
                    { "name": "Obst", "woerter": ["Apfel", "Birne"] },
                    { "name": "Tiere", "woerter": ["Hund", "Katze"] },
                    { "name": "Farben", "woerter": ["Rot", "Blau"] },
                    { "name": "Sport", "woerter": ["Fußbal", "Tennis"] }
                ];
            }
        }
        
        // Utility functions
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
        
        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }
        
        // Game functions
        function goToNames() {
            state.playerCount = parseInt(document.getElementById('playerCountSlider').value);
            state.playerNames = [];
            state.currentNameIndex = 0;
            document.getElementById('playerNameInput').value = '';
            document.getElementById('nameList').innerHTML = '';
            showScreen('screen-names');
            updateNamePrompt();
        }
        
        function updateNamePrompt() {
            document.getElementById('namePrompt').textContent = 'Spieler ' + (state.currentNameIndex + 1) + ' von ' + state.playerCount;
            document.getElementById('playerNameInput').focus();
        }
        
        function addPlayerName() {
            const input = document.getElementById('playerNameInput');
            let name = input.value.trim();
            
            if (!name) {
                name = 'Spieler ' + (state.currentNameIndex + 1);
            }
            
            state.playerNames.push(name);
            
            // Show name in list
            const nameList = document.getElementById('nameList');
            const item = document.createElement('div');
            item.className = 'name-list-item';
            item.innerHTML = '<span class="player-number">' + state.playerNames.length + '</span>' + name;
            nameList.appendChild(item);
            
            input.value = '';
            state.currentNameIndex++;
            
            if (state.currentNameIndex >= state.playerCount) {
                startGame();
            } else {
                updateNamePrompt();
            }
        }
        
        function startGame() {
            // Select random category and word
            const kat = getRandomItem(kategorien);
            state.currentCategory = kat.name;
            state.currentWord = getRandomItem(kat.woerter);
            
            // Select random impostor
            state.impostorIndex = Math.floor(Math.random() * state.playerCount);
            
            // Prepare words for all players
            state.words = [];
            for (let i = 0; i < state.playerCount; i++) {
                if (i === state.impostorIndex) {
                    state.words.push({ isImpostor: true, category: state.currentCategory });
                } else {
                    state.words.push({ isImpostor: false, word: state.currentWord });
                }
            }
            
            state.currentPlayerIndex = 0;
            state.isCardRevealed = false;
            showScreen('screen-pass-hidden');
            showHiddenCard();
        }
        
        function showHiddenCard() {
            state.isCardRevealed = false;
            document.getElementById('passHiddenPrompt').textContent = state.playerNames[state.currentPlayerIndex] + ' ist an der Reihe';
            
            document.getElementById('hiddenCard').innerHTML = '<p style="font-size: 3rem;">🎴</p><p style="margin-top: 15px; font-size: 1.2rem;">Karte umdrehen</p>';
            document.getElementById('hiddenCard').style.display = 'block';
            document.getElementById('nextPlayerBtn').style.display = 'none';
        }
        
        function revealCard() {
            if (state.isCardRevealed) return;
            state.isCardRevealed = true;
            
            const wordData = state.words[state.currentPlayerIndex];
            const card = document.getElementById('hiddenCard');
            
            if (wordData.isImpostor) {
                card.innerHTML = '<p class="category-only" style="font-size: 1rem;">Kategorie:</p><p class="impostor-word" style="font-size: 2.5rem;">' + wordData.category + '</p><p style="margin-top: 20px; color: #ff6b6b; font-size: 1.3rem;">DU BIST DER IMPOSTOR!</p>';
            } else {
                card.innerHTML = '<p style="color: #aaa; font-size: 1rem;">Dein geheimes Wort:</p><p style="font-size: 3rem; color: #4caf50; margin-top: 10px;">' + wordData.word + '</p>';
            }
            
            document.getElementById('nextPlayerBtn').style.display = 'block';
        }
        
        function nextPlayer() {
            state.currentPlayerIndex++;
            
            if (state.currentPlayerIndex >= state.playerCount) {
                showSelectImposter();
            } else {
                showHiddenCard();
            }
        }
        
        function showSelectImposter() {
            showScreen('screen-select');
            
            const selectionDiv = document.getElementById('playerSelection');
            selectionDiv.innerHTML = '';
            
            for (let i = 0; i < state.playerCount; i++) {
                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = '<span class="player-number">' + (i + 1) + '</span><span style="font-size: 1.2rem;">' + state.playerNames[i] + '</span>';
                card.onclick = function() { selectImposter(i); };
                selectionDiv.appendChild(card);
            }
        }
        
        function selectImposter(selectedIndex) {
            state.selectedImpostor = selectedIndex;
            showResults();
        }
        
        function showResults() {
            showScreen('screen-results');
            
            const resultBox = document.getElementById('resultBox');
            let resultHTML = '<p style="color: #aaa; margin-bottom: 10px;">Du hast gewählt:</p><p style="font-size: 1.5rem; margin-bottom: 20px;">' + state.playerNames[state.selectedImpostor] + '</p>';
            
            if (state.selectedImpostor === state.impostorIndex) {
                resultHTML += '<p class="winner-text">🎉 DER IMPOSTOR WURDE ENTLARVT!</p>';
            } else {
                resultHTML += '<p class="loser-text" style="font-size: 2rem;">😢 DU HAST DEN IMPOSTOR NICHT ERKANNT!</p>';
                resultHTML += '<p>Das geheime Wort war: <strong>' + state.currentWord + '</strong></p>';
                resultHTML += '<p style="margin-top: 10px;">' + state.playerNames[state.impostorIndex] + ' war der Imposter!</p>';
            }
            
            resultBox.innerHTML = resultHTML;
        }
        
        function newRound() {
            startGame();
        }
        
        function resetGame() {
            state.playerCount = 4;
            state.playerNames = [];
            state.words = [];
            state.impostorIndex = -1;
            state.selectedImpostor = -1;
            state.currentNameIndex = 0;
            
            document.getElementById('playerCountSlider').value = 4;
            document.getElementById('playerCountDisplay').textContent = '4';
            showScreen('screen-players');
        }
        
        // Slider event listener
        document.getElementById('playerCountSlider').addEventListener('input', function(e) {
            document.getElementById('playerCountDisplay').textContent = e.target.value;
        });
        
        // Enter key for name input
        document.getElementById('playerNameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addPlayerName();
            }
        });
        
        // Initialize
        loadData();
    </script>
</body>
</html>
